<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW PLAYER 2012 | بوابة الألعاب</title>
    <style>
        /* تصميم الخلفية والألوان المفضلة لديك */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* الأسود المفضل */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* رأس الموقع (Header) */
        header {
            background-color: #8b0000; /* الأحمر الداكن */
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 3px solid #fff;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }

        /* شبكة الألعاب (Grid) */
        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كرت اللعبة */
        .game-card {
            background-color: #262626;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid #444;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 20px rgba(139, 0, 0, 0.4);
            border-color: #8b0000;
        }

        .game-img {
            width: 100%;
            height: 180px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h3 {
            margin: 0;
            color: #fff;
        }

        .play-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background-color: #8b0000;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        /* تأثير النجوم في الخلفية */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <header>
        <h1>NEW PLAYER 2012 GAMES</h1>
        <p>أفضل الألعاب المختارة لمجتمع اللاعبين ⚡</p>
    </header>

    <div class="games-container">
        
        <div class="game-card" onclick="location.href='snake/index.html'">
            <div class="game-img">🐍</div>
            <div class="game-info">
                <h3>Snake Star Pro</h3>
                <p>تحدى سرعتك مع نجوم الثعبان!</p>
                <span class="play-btn">العب الآن</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-img">🚀</div>
            <div class="game-info">
                <h3>Space Explorer</h3>
                <p>قريباً.. مغامرة في الفضاء (Godot)</p>
                <span class="play-btn" style="background-color: #555;">قريباً</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-img">🧩</div>
            <div class="game-info">
                <h3>Puzzle Master</h3>
                <p>اختبر ذكاءك في حل الألغاز</p>
                <span class="play-btn" style="background-color: #555;">قريباً</span>
            </div>
        </div>

    </div>

    <footer style="text-align: center; padding: 20px; color: #666;">
        <p>© 2026 جميع الحقوق محفوظة لـ NEW PLAYER 2012</p>
    </footer>

</body>
</html>
