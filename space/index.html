<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مغامرة الفضاء - NEW PLAYER 2012</title>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; overflow: hidden; font-family: 'Segoe UI Emoji', sans-serif; }
        canvas { display: block; background: #020205; margin: 0 auto; border: 2px solid #333; width: 100%; max-width: 400px; }
        .controls { display: flex; justify-content: space-around; padding: 25px; }
        .btn { width: 70px; height: 70px; background: rgba(255, 0, 0, 0.2); border-radius: 50%; color: white; font-size: 2rem; border: 2px solid #8b0000; touch-action: manipulation; }
        .score-board { font-size: 1.2rem; margin: 10px; color: #ff0; }
    </style>
</head>
<body>
    <div class="score-board">النتيجة: <span id="score">0</span> 🏆</div>
    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <button class="btn" id="leftBtn">◀</button>
        <button class="btn" id="rightBtn">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 500;

        // إعدادات اللاعب والعقبات
        const PLAYER_EMOJI = "🚀";
        const OBSTACLE_EMOJI = "☄️";
        let rocket = { x: 180, y: 420, size: 45 };
        let obstacles = [];
        let score = 0;
        let gameActive = true;
        let speed = 4;

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. رسم الصاروخ (بدون أي مربعات خلفه)
            ctx.font = `${rocket.size}px serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(PLAYER_EMOJI, rocket.x + 22, rocket.y + 22);

            // 2. رسم وتحريك النيازك
            ctx.font = "38px serif";
            obstacles.forEach((obs, index) => {
                obs.y += speed;
                ctx.fillText(OBSTACLE_EMOJI, obs.x + 15, obs.y + 15);
                
                // حساب التصادم بدقة (المسافة بين الإيموجي)
                let hitX = (obs.x + 15) - (rocket.x + 22);
                let hitY = (obs.y + 15) - (rocket.y + 22);
                let distance = Math.sqrt(hitX * hitX + hitY * hitY);

                if (distance < 35) {
                    gameActive = false;
                    alert("💥 تصادم كوني! نتيجتك: " + score);
                    location.reload();
                }

                if (obs.y > 550) {
                    obstacles.splice(index, 1);
                    score++;
                    document.getElementById("score").innerText = score;
                    if(score % 5 === 0) speed += 0.3; // تزداد الصعوبة تدريجياً
                }
            });

            if (Math.random() < 0.04) {
                obstacles.push({ x: Math.random() * 350, y: -50 });
            }

            requestAnimationFrame(draw);
        }

        // التحكم باللمس والأسهم
        function moveLeft() { if(rocket.x > 10) rocket.x -= 35; }
        function moveRight() { if(rocket.x < 340) rocket.x += 35; }

        document.getElementById("leftBtn").onclick = moveLeft;
        document.getElementById("rightBtn").onclick = moveRight;
        window.onkeydown = (e) => {
            if(e.key === "ArrowLeft") moveLeft();
            if(e.key === "ArrowRight") moveRight();
        };

        draw();
    </script>
</body>
</html>
